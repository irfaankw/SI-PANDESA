{% extends 'base.html' %}

{% block content %}
<main class="min-h-screen bg-slate-50 py-12">
    <div class="container mx-auto max-w-4xl px-4">
        
        <!-- Navigasi Kembali -->
        <a href="{% url 'news:news_list' %}" class="group mb-8 inline-flex items-center text-sm font-medium text-slate-500 transition hover:text-emerald-600">
            <span class="mr-2 transform transition group-hover:-translate-x-1">←</span>
            Kembali ke Pengumuman
        </a>

        <!-- Konten Berita -->
        <article class="overflow-hidden rounded-3xl bg-white shadow-sm border border-slate-100">
            <!-- Gambar Utama -->
            {% if berita.gambar %}
            <img src="{{ berita.gambar.url }}" alt="{{ berita.judul }}" class="h-[400px] w-full object-cover">
            {% endif %}

            <div class="p-8 md:p-12">
                <!-- Meta Data -->
                <div class="mb-6 flex flex-wrap items-center gap-3">
                    <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-bold text-emerald-700">
                        {{ berita.kategori }}
                    </span>
                    <span class="text-sm text-slate-400">{{ berita.tanggal_dibuat|date:"d F Y" }}</span>
                </div>

                <!-- Judul -->
                <h1 class="mb-6 text-3xl font-bold leading-tight text-slate-900 md:text-4xl">
                    {{ berita.judul }}
                </h1>

                <!-- Isi Berita -->
                <div class="text-lg leading-relaxed text-slate-600">
                    {{ berita.isi|linebreaks }}
                </div>
            </div>
        </article>
        
    </div>
</main>
{% endblock content %}
